name: Daily Predictions

# 世界杯期间每天刷新数据并重算预测,把更新后的 PREDICTIONS.md / CSV 提交回仓库。
# 仅在预测发生变化时提交(小组赛每打完一轮,Elo 更新 → 后续预测随之变化)。
# 不提交任何第三方赔率数据,无需任何密钥即可运行。

on:
  schedule:
    - cron: "17 6 * * *"      # 每天 06:17 UTC(北京时间 14:17)
  workflow_dispatch: {}        # 也可在 Actions 页手动触发

permissions:
  contents: write

concurrency:
  group: daily-predictions
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh data & regenerate predictions
        run: |
          python -m scripts.download_data
          python -m scripts.predict_worldcup

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/wc2026_predictions.csv PREDICTIONS.md docs/predictions.json
          if git diff --staged --quiet; then
            echo "预测无变化,跳过提交。"
          else
            git commit -m "chore: daily prediction update [skip ci]"
            git push
          fi
